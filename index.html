<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coursework Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container mt-4">
        <div class="text-end mb-3">
    <button id="darkModeToggle" class="btn btn-dark"> Mode </button>
</div>
        <div class="text-center mb-4">
            <h1>Coursework Tracker</h1>
            <h5>Total Tasks: <span id="totalTasks">0</span></h5>
        </div>

        <div class="card p-3 mb-4">
            <h4>Add Task</h4>
            <form id="taskForm">
          <div class="row">
            <div class="col-md-3">
                <label for="courseName">Course Name: </label>
              <input type="text" id="course" class="form-control"  />
        </div> <br><br>

            <label for="assignmentTitle">Assignment Title: </label>
            <div class="col-md-3">
              <input type="text"id="title" class="form-control"/>
            </div><br><br>

            <label for="deadline">Deadline: </label>
            <div class="col-md-2">
              <input type="date" id="deadline" class="form-control" />
            </div><br><br>

            <label for="priority">Priority : </label>
            <div class="col-md-2">
              <select id="priority" class="form-control">
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
            </div><br><br>

            <div class="col-md-2">
                <button class="btn btn-primary w-100">Add Task</button>
            </div>
        </div>
        </form>
    </div>

      <div class="card p-3 mb-4">
            <h4>Summary</h4>
            <p>Total: <span id="summaryTotal">0</span></p>
            <p>Completed: <span id="summaryCompleted">0</span></p>
            <p>Pending: <span id="summaryPending">0</span></p>

            <div class="progress">
            <div id="progressBar" class="progress-bar" style="width: 0%">0%</div>
            </div>
      </div>

      <div id="taskList"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
